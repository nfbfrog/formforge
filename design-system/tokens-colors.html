<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FormForge — Color tokens</title>
<style>
* { box-sizing: border-box; margin: 0; }
body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; padding: 12px; display: grid; gap: 14px; }
.theme { padding: 16px; border-radius: 14px; display: grid; gap: 10px; }
.theme-light { --canvas:#f7f5ef; --paper:#fffefa; --line:#d9ded8; --ink:#17332f; --ink-soft:#49615e; --accent-strong:#143a36; --accent-text:#1d4f44; --coral:#e66b57; --mint:#dcebe3; --blue:#326a7b; --danger:#9e3d36; --ring:#2f7a5e; --watch-accent:#c56e36; background: var(--canvas); color: var(--ink); }
.theme-dark { --canvas:#131918; --paper:#1c2422; --line:#2b3733; --ink:#e7efeb; --ink-soft:#a3b6b0; --accent-strong:#2e6e5e; --accent-text:#8fcdb3; --coral:#ef8472; --mint:#21342c; --blue:#77aebf; --danger:#e2887f; --ring:#5cb88a; --watch-accent:#d99a55; background: var(--canvas); color: var(--ink); }
.t-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); }
.swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.swatch { display: grid; gap: 4px; }
.swatch i { display: block; height: 44px; border-radius: 9px; border: 1px solid var(--line); }
.swatch small { font-size: 9px; color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="theme theme-light">
    <span class="t-label">Light — warm neutral surfaces, one confident accent</span>
    <div class="swatches">
      <div class="swatch"><i style="background:var(--canvas)"></i><small>canvas</small></div>
      <div class="swatch"><i style="background:var(--paper)"></i><small>paper</small></div>
      <div class="swatch"><i style="background:var(--accent-strong)"></i><small>accent-strong</small></div>
      <div class="swatch"><i style="background:var(--ring)"></i><small>ring-stroke</small></div>
      <div class="swatch"><i style="background:var(--mint)"></i><small>mint</small></div>
      <div class="swatch"><i style="background:var(--coral)"></i><small>coral</small></div>
      <div class="swatch"><i style="background:var(--watch-accent)"></i><small>watch</small></div>
      <div class="swatch"><i style="background:var(--danger)"></i><small>danger</small></div>
      <div class="swatch"><i style="background:var(--blue)"></i><small>blue</small></div>
      <div class="swatch"><i style="background:var(--ink)"></i><small>ink</small></div>
    </div>
  </div>
  <div class="theme theme-dark">
    <span class="t-label">Dark — designed, not inverted: raised surfaces lighten, accents brighten</span>
    <div class="swatches">
      <div class="swatch"><i style="background:var(--canvas)"></i><small>canvas</small></div>
      <div class="swatch"><i style="background:var(--paper)"></i><small>paper</small></div>
      <div class="swatch"><i style="background:var(--accent-strong)"></i><small>accent-strong</small></div>
      <div class="swatch"><i style="background:var(--ring)"></i><small>ring-stroke</small></div>
      <div class="swatch"><i style="background:var(--mint)"></i><small>mint</small></div>
      <div class="swatch"><i style="background:var(--coral)"></i><small>coral</small></div>
      <div class="swatch"><i style="background:var(--watch-accent)"></i><small>watch</small></div>
      <div class="swatch"><i style="background:var(--danger)"></i><small>danger</small></div>
      <div class="swatch"><i style="background:var(--blue)"></i><small>blue</small></div>
      <div class="swatch"><i style="background:var(--ink)"></i><small>ink</small></div>
    </div>
  </div>
</body>
</html>
